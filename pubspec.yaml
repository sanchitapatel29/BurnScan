name: burn_scan
description: Offline-first burn assessment interface for clinical workflows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  crypto: ^3.0.7
  image: ^4.8.0
  image_picker: ^1.2.1
  intl: ^0.19.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.12.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  flutter_plugin_android_lifecycle: ^2.0.34

flutter:
  uses-material-design: true
  assets:
    - assets/
